# Publish `pareta` to npm on a GitHub Release, via npm Trusted Publishing
# (OIDC — no long-lived token) with build provenance.
#
# One-time npm setup (npmjs.com → the `pareta` package → Settings → Trusted
# Publisher, or pre-register before the first publish):
#   Organization / user : Pareta-AI
#   Repository          : pareta-js
#   Workflow filename   : publish.yml
#   Environment         : (none required)
#
# Cut a GitHub Release (e.g. v0.1.0) → this builds, tests, and publishes with
# `--provenance`. SemVer 0.x until the surface is stable, then 1.0.0.
name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token for Trusted Publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm publish --provenance --access public
